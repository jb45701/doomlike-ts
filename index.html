<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doomlike FPS</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* ── Click-to-start overlay ─────────────────────────────────── */
      #overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        z-index: 10;
        cursor: pointer;
        user-select: none;
      }
      #overlay.hidden { display: none; }
      #overlay .prompt {
        text-align: center;
        font-size: 1.5rem;
        letter-spacing: 2px;
        line-height: 2;
      }
      #overlay .prompt .title {
        font-size: 3rem;
        font-weight: bold;
        color: #ff4444;
        text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
      }
      #overlay .prompt .hint {
        font-size: 1rem;
        color: #888;
        margin-top: 1em;
      }

      /* ── HUD ─────────────────────────────────────────────────────── */
      #hud {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 5;
        display: none;
        user-select: none;
      }
      #hud.active { display: block; }

      #health-display {
        position: absolute;
        bottom: 40px;
        left: 40px;
        color: #fff;
      }
      #health-display .health-number {
        font-size: 2.5rem;
        font-weight: bold;
        display: inline-block;
        vertical-align: middle;
      }
      #health-display .health-bar-bg {
        display: inline-block;
        width: 120px;
        height: 14px;
        background: #333;
        border: 2px solid #666;
        margin-left: 10px;
        vertical-align: middle;
      }
      #health-display .health-bar-fill {
        height: 100%;
        background: #00cc44;
        transition: width 0.1s ease;
        width: 100%;
      }
      #health-display .armor-number {
        display: block;
        font-size: 1rem;
        color: #88aaff;
        margin-top: 4px;
      }
      .health-low .health-number { color: #ff4444; }
      .health-low .health-bar-fill { background: #cc2222; }

      #face-display {
        position: absolute;
        bottom: 40px;
        left: 230px;
        width: 40px;
        height: 40px;
        border: 2px solid #555;
        background: #aa8844;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        color: #000;
      }

      #ammo-display {
        position: absolute;
        bottom: 40px;
        right: 40px;
        text-align: right;
        color: #fff;
      }
      #ammo-display .ammo-number { font-size: 2.5rem; font-weight: bold; }
      #ammo-display .ammo-max { font-size: 1.2rem; color: #888; }
      #ammo-display .ammo-label {
        font-size: 0.8rem; color: #666;
        text-transform: uppercase; letter-spacing: 2px;
      }
      .ammo-empty .ammo-number { color: #ff4444; }

      #weapon-name {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 1rem;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 3px;
      }

      #crosshair {
        position: absolute;
        top: 50%; left: 50%;
        width: 20px; height: 20px;
        transform: translate(-50%, -50%);
      }
      #crosshair::before, #crosshair::after {
        content: '';
        position: absolute;
        background: rgba(255, 255, 255, 0.7);
      }
      #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
      #crosshair::after { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }

      #damage-flash {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255, 0, 0, 0);
        pointer-events: none;
        transition: background-color 0s;
      }
      #damage-flash.flash { background: rgba(255, 0, 0, 0.35); transition: background-color 0s; }
      #damage-flash.fade { background: rgba(255, 0, 0, 0); transition: background-color 0.3s ease-out; }

      #weapon-bob {
        position: absolute;
        bottom: 0; right: 0; width: 100%; height: 100%;
        pointer-events: none;
        overflow: hidden;
      }
      #weapon-sprite {
        position: absolute;
        bottom: 60px;
        right: 80px;
        width: 160px;
        height: 120px;
        background: #664400;
        border: 2px solid #886622;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        color: #ccaa66;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: none;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <div class="prompt">
        <div class="title">DOOMLIKE</div>
        <div>Click to start</div>
        <div class="hint">(requires pointer lock)</div>
      </div>
    </div>

    <div id="hud">
      <div id="health-display">
        <span class="health-number" id="health-value">100</span>
        <div class="health-bar-bg">
          <div class="health-bar-fill" id="health-bar" style="width:100%"></div>
        </div>
        <span class="armor-number" id="armor-value"></span>
      </div>
      <div id="face-display" title="Player face">:)</div>

      <div id="ammo-display">
        <div>
          <span class="ammo-number" id="ammo-value">20</span>
          <span class="ammo-max">/ <span id="ammo-max-value">20</span></span>
        </div>
        <div class="ammo-label">Ammo</div>
      </div>

      <div id="weapon-name">Pistol</div>
      <div id="crosshair"></div>
      <div id="damage-flash"></div>

      <div id="weapon-bob">
        <div id="weapon-sprite">WEAPON</div>
      </div>
    </div>

    <canvas id="game-canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
