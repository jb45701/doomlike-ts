<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doomlike FPS</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        font-family: 'Courier New', monospace;
        z-index: 10;
        cursor: pointer;
        user-select: none;
      }
      #overlay.hidden { display: none; }
      #overlay .prompt {
        text-align: center;
        font-size: 1.5rem;
        letter-spacing: 2px;
        line-height: 2;
      }
      #overlay .prompt .title {
        font-size: 3rem;
        font-weight: bold;
        color: #ff4444;
        text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
      }
      #overlay .prompt .hint {
        font-size: 1rem;
        color: #888;
        margin-top: 1em;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <div class="prompt">
        <div class="title">DOOMLIKE</div>
        <div>Click to start</div>
        <div class="hint">(requires pointer lock)</div>
      </div>
    </div>
    <canvas id="game-canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
